name: hives_workspace
description: A monorepo workspace for the Hives project managed with Melos
version: 1.0.0
publish_to: none

environment:
  sdk: '^3.10.3'

dev_dependencies:
  melos: ^7.3.0
  flutter_lints: ^6.0.0  # Required for root analysis_options.yaml

workspace:
  # Core packages (shared infrastructure)
  - packages/shared                        # core_domain equivalent - DDD base classes
  - packages/ui                            # core_ui equivalent - design system
  - packages/core/core_data                # Database, API client, sync infrastructure
  - packages/core/core_infrastructure      # Event bus, DI, navigation

  # Feature packages (bounded contexts)
  - packages/features/authentication
  - packages/features/locations
  - packages/features/hives
  - packages/features/inspections
  - packages/features/tasks
  - packages/features/dashboard

  # Application packages
  - apps/mobile
  - apps/storybook

melos:
  name: hives

  command:
    bootstrap:
      runPubGetInParallel: true
      runPubGetOffline: false
      hooks:
        post: |
          melos run build

    version:
      branch: main
      message: |
        chore(release): publish packages
        
        {new_package_versions}
      updateGitTagRefs: true
      workspaceChangelog: true

    clean:
      hooks:
        post: |
          melos exec -- "rm -rf build coverage .dart_tool"

  scripts:
    analyze:
      run: melos exec -- "dart analyze ."
      description: Run Dart analyzer in all packages

    format:
      run: melos exec -- "dart format ."
      description: Format all Dart files

    format:check:
      run: melos exec -- "dart format --set-exit-if-changed ."
      description: Check if all Dart files are formatted

    test:
      run: melos exec --fail-fast -- "flutter test --no-pub"
      description: Run tests in all packages that have test files
      select-package:
        flutter: true
        dir-exists: test

    test:coverage:
      run: melos exec --fail-fast -- "flutter test --no-pub --coverage"
      description: Run tests with coverage in all packages that have test files
      select-package:
        flutter: true
        dir-exists: test

    get:
      run: melos exec -- "dart pub get"
      description: Run pub get in all packages

    upgrade:
      run: melos exec -- "dart pub upgrade"
      description: Run pub upgrade in all packages

    clean:
      run: melos clean
      description: Clean all packages

    build:
      exec: |
        dart run build_runner build --delete-conflicting-outputs
      description: Run build_runner in all packages with build_runner dev dependency
      packageFilters:
        dependsOn: build_runner
